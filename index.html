<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajni Public School - Result 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #28a745; }
        input { width: 85%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #28a745; }
        button { background: #28a745; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 93%; transition: 0.3s; }
        button:hover { background: #218838; }

        /* मार्कशीट डिजाइन */
        #resultView { display: none; margin-top: 30px; width: 100%; max-width: 700px; background: white; padding: 40px; border: 1px solid #000; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
        .school-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .photo-frame { width: 110px; height: 130px; border: 1px solid #000; float: right; display: flex; align-items: center; justify-content: center; background: #f9f9f9; overflow: hidden; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .details-table td { padding: 8px; font-size: 15px; vertical-align: top; }
        .marks-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .marks-table th, .marks-table td { border: 1px solid #000; padding: 10px; text-align: left; }
        .marks-table th { background: #f2f2f2; }
        .footer { margin-top: 50px; display: flex; justify-content: space-between; font-weight: bold; }
        .print-btn { background: #007bff; margin-top: 20px; width: auto; padding: 10px 25px; }
        @media print { .search-box, .print-btn { display: none; } #resultView { border: none; box-shadow: none; margin-top: 0; } }
    </style>
</head>
<body>

    <div class="search-box">
        <h2 style="margin-top:0;">Student Result Portal</h2>
        <p>Enter Roll Number to View Result</p>
        <input type="text" id="rollInput" placeholder="Ex: 101, 102...">
        <button onclick="searchStudent()">Search Result</button>
    </div>

    <div id="resultView">
        <div class="photo-frame" id="stPhoto">PHOTO</div>
        <div class="school-header">
            <h1 style="margin:0;">RAJNI PUBLIC SCHOOL</h1>
            <p style="margin:5px 0; font-size: 18px;">Annual Result Report - 2025-26</p>
        </div>

        <table class="details-table">
            <tr>
                <td><strong>Name:</strong> <span id="outName"></span></td>
                <td><strong>Roll No:</strong> <span id="outRoll"></span></td>
            </tr>
            <tr>
                <td><strong>Father's Name:</strong> <span id="outFather"></span></td>
                <td><strong>Class:</strong> <span id="outClass"></span></td>
            </tr>
            <tr>
                <td><strong>Mother's Name:</strong> <span id="outMother"></span></td>
                <td><strong>DOB:</strong> <span id="outDob"></span></td>
            </tr>
            <tr>
                <td><strong>Reg. No:</strong> <span id="outReg"></span></td>
                <td><strong>Issue Date:</strong> <span id="outIssue"></span></td>
            </tr>
            <tr>
                <td colspan="2"><strong>Address:</strong> <span id="outAddr"></span></td>
            </tr>
        </table>

        <table class="marks-table">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Detail / Remark</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Attendance</td><td id="outAtten"></td></tr>
                <tr><td>Session</td><td id="outSession"></td></tr>
            </tbody>
        </table>

        <div class="footer">
            <p>Class Teacher</p>
            <p>Principal Signature</p>
        </div>
        
        <button class="print-btn" onclick="window.print()" style="color:white; border-radius:5px; cursor:pointer; border:none;">Print Marksheet</button>
    </div>

    <script>
        // अपनी Sheet3 (database) का CSV लिंक यहाँ डालें
        const SHEET_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV1h6s0ZZ1ryGa112nhw3eeTXl_iR3hHmMg-JKJoyGb2s0cFO9b6YLH6i1uo4A4m9kfBHSTE9JRfiN/pub?output=csv";

        async function searchStudent() {
            const val = document.getElementById("rollInput").value.trim();
            if(!val) return alert("Please enter Roll Number");

            try {
                const response = await fetch(SHEET_LINK);
                const csvText = await response.text();
                // डेटा को क्लीन करना (Split by rows and columns)
                const rows = csvText.split("\n").map(r => r.split(","));

                let foundRow = null;

                // Column I (Index 8) में सर्च करना
                for (let i = 1; i < rows.length; i++) {
                    const currentRow = rows[i];
                    if (currentRow[8] && currentRow[8].toString().trim() == val) {
                        foundRow = currentRow;
                        break;
                    }
                }

                if (foundRow) {
                    showMarksheet(foundRow);
                } else {
                    alert("Roll Number '" + val + "' not found in our database!");
                }

            } catch (err) {
                alert("Database Error! Check your Internet or CSV Link.");
            }
        }

        function showMarksheet(d) {
            document.getElementById("outName").innerText = d[1];   // Col B
            document.getElementById("outFather").innerText = d[2]; // Col C
            document.getElementById("outMother").innerText = d[3]; // Col D
            document.getElementById("outDob").innerText = d[4];    // Col E
            document.getElementById("outClass").innerText = d[5];  // Col F
            document.getElementById("outAddr").innerText = d[6];   // Col G
            document.getElementById("outReg").innerText = d[7];    // Col H
            document.getElementById("outRoll").innerText = d[8];   // Col I
            document.getElementById("outSession").innerText = d[9];// Col J
            document.getElementById("outAtten").innerText = d[10]; // Col K
            document.getElementById("outIssue").innerText = d[11]; // Col L

            // फोटो वाला हिस्सा (Column M = Index 12)
            const photoDiv = document.getElementById("stPhoto");
            const dID = d[12] ? d[12].trim() : "";
            if(dID.length > 5) {
                photoDiv.innerHTML = `<img src="https://lh3.googleusercontent.com/u/0/d/$${dID}" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                photoDiv.innerHTML = "NO PHOTO";
            }

            document.getElementById("resultView").style.display = "block";
        }
    </script>
</body>
</html>
