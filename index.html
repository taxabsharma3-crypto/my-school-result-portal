<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Rajni Public School - Result 2026</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 400px; text-align: center; border-top: 5px solid #d32f2f; }
        input { width: 80%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        button { background: #d32f2f; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 90%; }
        #marksheet { display: none; width: 1000px; background: white; padding: 40px; border: 3px solid #000; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; }
        .msg-box { margin-top: 20px; padding: 15px; background: #fff9c4; border: 1px solid #fbc02d; font-weight: bold; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>RAJNI PUBLIC SCHOOL</h2>
        <input type="text" id="regInput" placeholder="Enter Registration Number">
        <button onclick="getResult()">SHOW RESULT</button>
        <p id="loader" style="display:none; color:blue;">Finding Student...</p>
    </div>

    <div id="marksheet">
        <h1 style="text-align:center; color:#d32f2f; margin:0;">RAJNI PUBLIC SCHOOL</h1>
        <p style="text-align:center; font-weight:bold; border-bottom: 2px solid #000; padding-bottom: 10px;">ANNUAL PROGRESS REPORT CARD | 2025-26</p>

        <div style="display: flex; justify-content: space-between; margin: 20px 0; font-size: 16px;">
            <div><strong>Name:</strong> <span id="sName"></span><br><strong>Father:</strong> <span id="sFather"></span></div>
            <div style="text-align: right;"><strong>Reg No:</strong> <span id="sReg"></span> | <strong>Class:</strong> <span id="sClass"></span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th rowspan="2">SUBJECTS</th>
                    <th colspan="2">FA-1</th><th colspan="2">HALF YEARLY</th><th colspan="2">FA-2</th><th colspan="2">ANNUAL</th><th colspan="2">TOTAL</th>
                </tr>
                <tr>
                    <th>MM</th><th>OBT</th><th>MM</th><th>OBT</th><th>MM</th><th>OBT</th><th>MM</th><th>OBT</th><th>MM</th><th>OBT</th>
                </tr>
            </thead>
            <tbody id="marksBody"></tbody>
        </table>

        <div id="specialMsg" class="msg-box"></div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 60px; font-weight: bold;">
            <p>Class Teacher</p><p>Principal</p>
        </div>
    </div>

    <script>
        // *** YAHAN APNI INFO DALO ***
        const SHEET_ID = 'https://docs.google.com/spreadsheets/d/1-ov0K7k-uuCFHqQjGJ91tD8HOfkIxlcV0L4lBEcNevk/edit?usp=sharing'; // Apni Sheet ID yahan dalo
        const SHEET_NAME = 'SHEET A'; // Sheet tab ka naam (e.g. database or Sheet1)

        google.charts.load('current', {'packages':['corechart']});

        function getResult() {
            const reg = document.getElementById("regInput").value.trim();
            if(!reg) return alert("Please enter Reg No");
            document.getElementById("loader").style.display = "block";

            // SQL Query to find data where Column H (Registration) matches input
            const query = encodeURIComponent(`SELECT * WHERE H = '${reg}'`);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}&tq=${query}`;

            fetch(url).then(res => res.text()).then(text => {
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const row = json.table.rows[0];

                if(row) {
                    const d = row.c.map(cell => cell ? (cell.v || "") : "");
                    showData(d);
                } else {
                    alert("Registration Number not found!");
                }
                document.getElementById("loader").style.display = "none";
            }).catch(e => alert("Connection Error! Check Sheet ID and Share settings."));
        }

        function showData(d) {
            document.getElementById("sName").innerText = d[1];
            document.getElementById("sFather").innerText = d[2];
            document.getElementById("sClass").innerText = d[5];
            document.getElementById("sReg").innerText = d[7];

            const subs = [
                {n:"HINDI", f1m:34, f1o:35, hym:92, hyo:93, f2m:121, f2o:122, anm:179, ano:180},
                {n:"ENGLISH", f1m:36, f1o:37, hym:94, hyo:95, f2m:123, f2o:124, anm:181, ano:182},
                {n:"MATHS", f1m:38, f1o:39, hym:96, hyo:97, f2m:125, f2o:126, anm:183, ano:184},
                {n:"SCIENCE", f1m:40, f1o:41, hym:98, hyo:99, f2m:127, f2o:128, anm:185, ano:186},
                {n:"SST", f1m:42, f1o:43, hym:100, hyo:101, f2m:129, f2o:130, anm:187, ano:188}
            ];

            let html = ""; let tO=0, tM=0;
            subs.forEach(s => {
                let m1=d[s.f1m], o1=d[s.f1o], m2=d[s.hym], o2=d[s.hyo], m3=d[s.f2m], o3=d[s.f2o], m4=d[s.anm], o4=d[s.ano];
                let sm=m1+m2+m3+m4, so=o1+o2+o3+o4; tO+=so; tM+=sm;
                html += `<tr><td style="text-align:left; font-weight:bold;">${s.n}</td><td>${m1}</td><td>${o1}</td><td>${m2}</td><td>${o2}</td><td>${m3}</td><td>${o3}</td><td>${m4}</td><td>${o4}</td><td style="background:#eee;">${sm}</td><td style="background:#eee; font-weight:bold;">${so}</td></tr>`;
            });

            document.getElementById("marksBody").innerHTML = html;
            let p = (tO/tM)*100;
            let msg = p >= 91 ? "Awesome!" : p >= 81 ? "Unique!" : p >= 71 ? "Good going!" : p >= 33 ? "Promoted!" : "Advice to Repeat Same Class";
            document.getElementById("specialMsg").innerHTML = `RESULT: ${p.toFixed(2)}% <br> ${msg} Your Child is promoted to next class.`;
            document.getElementById("marksheet").style.display = "block";
        }
    </script>
</body>
</html>
