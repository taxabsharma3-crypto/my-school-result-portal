<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Rajni Public School - Result Fix</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #d32f2f; color: white; border: none; cursor: pointer; }
        #debugInfo { color: red; margin-top: 20px; font-size: 12px; text-align: left; background: #eee; padding: 10px; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>RAJNI PUBLIC SCHOOL</h2>
        <p>अपना रजिस्ट्रेशन नंबर डालें:</p>
        <input type="text" id="regInput" placeholder="Ex: 101">
        <br>
        <button onclick="checkData()">रिजल्ट देखें</button>
        <div id="debugInfo"></div>
    </div>

    <div id="displayArea" style="margin-top:30px;"></div>

    <script>
        // अपना CSV लिंक यहाँ डालें (बिना इसके कुछ काम नहीं करेगा)
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV1h6s0ZZ1ryGa112nhw3eeTXl_iR3hHmMg-JKJoyGb2s0cFO9b6YLH6i1uo4A4m9kfBHSTE9JRfiN/pub?gid=1253973170&single=true&output=csv";

        async function checkData() {
            const val = document.getElementById("regInput").value.trim();
            const debug = document.getElementById("debugInfo");
            debug.style.display = "block";
            debug.innerText = "Connecting to Google Sheet...";

            if(!SHEET_CSV.includes("output=csv")) {
                debug.innerText = "ERROR: आपका लिंक सही CSV लिंक नहीं है। 'Publish to Web' से CSV चुनें।";
                return;
            }

            try {
                const response = await fetch(SHEET_CSV + "&cache=" + new Date().getTime());
                const text = await response.text();
                
                debug.innerText = "Data received. Parsing...";
                const rows = text.split("\n").map(r => r.split(","));
                
                // Column H (Index 7) में रजिस्ट्रेशन नंबर चेक करना
                const student = rows.find(r => r[7] && r[7].trim() == val);

                if(student) {
                    debug.innerText = "Student Found! Loading Marksheet...";
                    alert("Record Found: " + student[1]);
                    // यहाँ आपकी मार्कशीट रेंडर करने वाला पुराना फंक्शन (renderData) डाल सकते हैं
                } else {
                    debug.innerText = "ERROR: रजिस्ट्रेशन नंबर '" + val + "' शीट में नहीं मिला। (चेक करें कि क्या यह कॉलम H में है?)";
                }
            } catch(e) {
                debug.innerText = "CONNECTION ERROR: " + e.message;
            }
        }
    </script>
</body>
</html>
