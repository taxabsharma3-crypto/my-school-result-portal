<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajni Public School - Result Portal</title>
    <style>
        /* सुंदर डिजाइन के लिए CSS */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #007bff; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 85%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 93%; transition: 0.3s; }
        button:hover { background: #0056b3; transform: translateY(-2px); }

        /* मार्कशीट का डिजाइन */
        #resultArea { display: none; margin-top: 30px; width: 100%; max-width: 650px; background: white; padding: 40px; border: 2px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.2); position: relative; }
        .school-name { text-align: center; font-size: 24px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .exam-name { text-align: center; font-size: 16px; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .student-info { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; }
        th { background: #f2f2f2; }
        .footer { margin-top: 30px; display: flex; justify-content: space-between; font-weight: bold; }
        .status-pass { color: green; font-weight: bold; font-size: 20px; }
        .status-fail { color: red; font-weight: bold; font-size: 20px; }
        @media print { .search-box, .print-btn { display: none; } #resultArea { border: none; box-shadow: none; margin-top: 0; } }
    </style>
</head>
<body>

    <div class="search-box">
        <h2>Student Result Search</h2>
        <input type="text" id="rollNo" placeholder="Enter Roll Number">
        <button onclick="fetchSheetData()">Check Result</button>
    </div>

    <div id="resultArea">
        <div class="school-name">RAJNI PUBLIC SCHOOL</div>
        <div class="exam-name">Annual Examination Report Card - 2026</div>

        <div class="student-info">
            <div>
                <p><strong>Name:</strong> <span id="stName"></span></p>
                <p><strong>Father's Name:</strong> <span id="stFather"></span></p>
            </div>
            <div>
                <p><strong>Roll No:</strong> <span id="stRoll"></span></p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Subject Name</th>
                    <th>Max Marks</th>
                    <th>Marks Obtained</th>
                </tr>
            </thead>
            <tbody id="marksRows">
                </tbody>
        </table>

        <div class="footer">
            <p>Result Status: <span id="finalStatus"></span></p>
            <p>Signature of Principal</p>
        </div>
        
        <button class="print-btn" onclick="window.print()" style="margin-top: 20px; background: #28a745; width: auto;">Print Now</button>
    </div>

    <script>
        // अपना Google Sheet CSV Link यहाँ नीचे वाले डबल कोट्स में पेस्ट करें
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV1h6s0ZZ1ryGa112nhw3eeTXl_iR3hHmMg-JKJoyGb2s0cFO9b6YLH6i1uo4A4m9kfBHSTE9JRfiN/pub?output=csv";

        async function fetchSheetData() {
            const inputRoll = document.getElementById("rollNo").value.trim();
            if(!inputRoll) { alert("Please enter a Roll Number"); return; }

            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csvData = await response.text();
                const rows = csvData.split("\n").map(row => row.split(","));

                let studentFound = false;

                // Loop through rows (starting from 1 to skip header)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    // row[0] में Roll Number होना चाहिए
                    if (row[0] && row[0].trim() === inputRoll) {
                        displayResult(row);
                        studentFound = true;
                        break;
                    }
                }

                if (!studentFound) {
                    alert("Result not found for Roll No: " + inputRoll);
                }

            } catch (error) {
                console.error("Error:", error);
                alert("Error connecting to database. Make sure your link is correct!");
            }
        }

        function displayResult(data) {
            document.getElementById("stRoll").innerText = data[0];
            document.getElementById("stName").innerText = data[1];
            document.getElementById("stFather").innerText = data[2];

            // मान लीजिए Column 3, 4, 5 में Hindi, English, Maths के मार्क्स हैं
            const subjects = [
                { name: "Hindi", marks: data[3] },
                { name: "English", marks: data[4] },
                { name: "Mathematics", marks: data[5] }
            ];

            let tableHTML = "";
            let totalMarks = 0;

            subjects.forEach(sub => {
                tableHTML += `<tr><td>${sub.name}</td><td>100</td><td>${sub.marks}</td></tr>`;
                totalMarks += parseInt(sub.marks) || 0;
            });

            document.getElementById("marksRows").innerHTML = tableHTML;
            
            const statusLabel = document.getElementById("finalStatus");
            if(totalMarks >= 100) {
                statusLabel.innerText = "PASSED";
                statusLabel.className = "status-pass";
            } else {
                statusLabel.innerText = "FAILED";
                statusLabel.className = "status-fail";
            }

            document.getElementById("resultArea").style.display = "block";
        }
    </script>
</body>
</html>
