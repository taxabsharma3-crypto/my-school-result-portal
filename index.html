<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>BBCS Portal - Topper Finder</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .admin-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 5px solid #2ecc71; }
        .btn-topper { background: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        #topperResult { margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 8px; display: none; color: #117a65; font-weight: bold; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>BBCS MASTER PANEL</h2>
        <p>Class 8 ka sabse honhaar (Topper) student dhoondhein:</p>
        <button class="btn-topper" onclick="findClass8Topper()">🏆 Class 8 Topper Dekhein</button>
        
        <div id="topperResult"></div>

        <hr style="margin: 20px 0; border: 0.5px solid #eee;">
        
        <p>Individual Result Dekhein:</p>
        <input type="text" id="admInput" placeholder="Admission No. Likhein">
        <button onclick="alert('Bhai pehle topper check kar lo, phir result nikalenge!')" style="padding:10px; width:100%;">Result Dekhein</button>
    </div>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVYOZX3AnpGZi8LxABZEEFC0Iya7ZtSJdxAvNwXI2zFgwtmWUtgAjZW81QQCxFeb6Npj1WvXepkOYy/pub?gid=853110802&single=true&output=csv";

        async function findClass8Topper() {
            const resDiv = document.getElementById("topperResult");
            resDiv.style.display = "block";
            resDiv.innerText = "Sheet scan ho rahi hai... Sabr rakhein...";

            try {
                const resp = await fetch(SHEET_CSV + "&cb=" + Date.now());
                const data = await resp.text();
                const rows = data.split(/\r?\n/).map(r => r.split(","));
                
                let topperName = "";
                let maxPerc = 0;
                let topperAdm = "";

                // Row 1 se start karenge (Header chhod kar)
                for(let i = 1; i < rows.length; i++) {
                    let row = rows[i];
                    let studentClass = row[5] ? row[5].trim() : "";

                    // Sirf Class 8 ke students check karega
                    if(studentClass == "8") {
                        let shift = (parseInt(row[0]) >= 60) ? 1 : 0;
                        
                        // Main Subjects ke marks (Hindi, English, Math, Science, SST)
                        // Indices: 35, 37, 39, 41, 43... (Shift ke sath)
                        let subIndices = [35, 37, 39, 41, 43, 45, 47, 49, 51];
                        let totalObt = 0;
                        let totalMM = 0;

                        subIndices.forEach(idx => {
                            let obt = parseFloat(row[idx + shift]) || 0;
                            let mm = parseFloat(row[idx + shift - 1]) || 10; // Default MM 10 if missing
                            totalObt += obt;
                            totalMM += (mm > 0 ? mm : 10);
                        });

                        let perc = (totalObt / totalMM) * 100;

                        if(perc > maxPerc) {
                            maxPerc = perc;
                            topperName = row[1];
                            topperAdm = row[0];
                        }
                    }
                }

                if(topperName) {
                    resDiv.innerHTML = `🎉 Class 8 Topper Found!<br><br>Name: ${topperName.toUpperCase()}<br>Adm No: ${topperAdm}<br>Percentage: ${maxPerc.toFixed(2)}%`;
                } else {
                    resDiv.innerText = "Class 8 ka koi data nahi mila. Sheet check karein.";
                }

            } catch (e) {
                resDiv.innerText = "Error: Sheet connect nahi ho pa rahi.";
            }
        }
    </script>
</body>
</html>
