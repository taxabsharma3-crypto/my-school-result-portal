<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Bells Convent School - Final Result 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f7; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-box { background: #fff3cd; border: 2px dashed #856404; padding: 15px; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 450px; text-align: center; }
        .search-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 8px solid #1a73e8; }
        select, input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-search { background: #1a73e8; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 95%; font-weight: bold; font-size: 16px; }
        #marksheetFull { display: none; width: 1050px; background: white; padding: 40px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.15); margin-top: 20px; color: #000; }
        .header-main { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px double #1a73e8; padding-bottom: 15px; margin-bottom: 20px; }
        .st-photo { width: 125px; height: 150px; border: 2px solid #1a73e8; display: flex; align-items: center; justify-content: center; background: #fdfdfd; overflow: hidden; }
        .st-photo img { width: 100%; height: 100%; object-fit: cover; }
        .marks-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        .marks-table th, .marks-table td { border: 1px solid #1a73e8; padding: 6px; }
        .bg-head { background: #e8f0fe; color: #1a73e8; font-weight: bold; }
        .sub-name { text-align: left !important; padding-left: 10px !important; font-weight: bold; }
        .total-row { background: #d2e3fc; font-weight: bold; font-size: 13px; color: #1557b0; }
        .final-summary { margin-top: 20px; display: flex; justify-content: space-around; border: 2px solid #1a73e8; padding: 15px; font-weight: bold; background: #f8fbff; font-size: 16px; color: #1557b0; }
        @media print { .search-card, .admin-box, .print-btn { display: none; } #marksheetFull { border: none; box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

    <div class="admin-box">
        <strong>ADMIN CONTROL</strong><br>
        <select id="activeClassControl" style="width: 70%; padding: 5px; margin-top: 5px;">
            <option value="ALL">All Classes Open</option>
            <option value="8">Class 8</option><option value="7">Class 7</option><option value="6">Class 6</option><option value="5">Class 5</option>
        </select>
    </div>

    <div class="search-card">
        <h2 style="color:#1a73e8; margin:0;">BLUE BELLS CONVENT SCHOOL</h2>
        <select id="studentClassSelect">
            <option value="">-- Choose Your Class --</option>
            <option value="8">Class 8</option><option value="7">Class 7</option><option value="6">Class 6</option><option value="5">Class 5</option>
        </select>
        <input type="text" id="admInput" placeholder="Enter Admission No.">
        <button class="btn-search" onclick="findResult()">Show Marksheet</button>
    </div>

    <div id="marksheetFull">
        <div class="header-main">
            <img src="https://drive.google.com/uc?export=view&id=1UPFTUfGRttSd6jdF4VK8KqTRI30sy0ad" style="width:110px;" alt="Logo">
            <div style="text-align:center;">
                <h1 style="margin:0; font-size: 32px; color: #1a73e8;">BLUE BELLS CONVENT SCHOOL</h1>
                <p style="margin:5px 0; font-weight: 600;">ANNUAL PROGRESS REPORT CARD (2025-26)</p>
            </div>
            <div class="st-photo" id="photoArea">PHOTO</div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 15px; border: 1px solid #d2e3fc; padding: 10px; background: #f8fbff;">
            <div><strong>Student Name:</strong> <span id="sName" style="text-transform: uppercase;"></span><br><strong>Father's Name:</strong> <span id="sFather" style="text-transform: uppercase;"></span></div>
            <div style="text-align:right;"><strong>Adm No:</strong> <span id="sAdm"></span> | <strong>Class:</strong> <span id="sClass"></span><br><strong>Reg No:</strong> <span id="sReg"></span></div>
        </div>

        <table class="marks-table">
            <thead>
                <tr class="bg-head">
                    <th rowspan="2" style="width: 180px;">SUBJECT NAME</th>
                    <th colspan="3">FA-1</th><th colspan="3">HALF YEARLY</th><th colspan="3">FA-2</th><th colspan="3">ANNUAL EXAM</th><th colspan="3">GRAND TOTAL</th>
                </tr>
                <tr class="bg-head"><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th></tr>
            </thead>
            <tbody id="marksBody"></tbody>
            <tfoot id="totalRow"></tfoot>
        </table>

        <div class="final-summary">
            <div>PERCENTAGE: <span id="resPerc"></span>%</div>
            <div>GRADE: <span id="resGrade"></span></div>
            <div>STATUS: <span id="resStatus"></span></div>
            <div>ATTENDANCE: <span id="resAtten"></span></div>
        </div>

        <div style="text-align: center; margin-top: 40px;"><button onclick="window.print()" class="print-btn" style="background:#28a745; color:white; padding:12px 30px; border:none; border-radius:6px; cursor:pointer; font-weight: bold;">Print Marksheet</button></div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVYOZX3AnpGZi8LxABZEEFC0Iya7ZtSJdxAvNwXI2zFgwtmWUtgAjZW81QQCxFeb6Npj1WvXepkOYy/pub?gid=853110802&single=true&output=csv";

        async function findResult() {
            const selectedClass = document.getElementById("studentClassSelect").value;
            const admNo = document.getElementById("admInput").value.trim();
            const activeAdminClass = document.getElementById("activeClassControl").value;
            if(!selectedClass || !admNo) return alert("Fill details!");
            if(activeAdminClass !== "ALL" && selectedClass !== activeAdminClass) return alert("Result closed!");

            try {
                const resp = await fetch(SHEET_URL + "&cb=" + new Date().getTime());
                const data = await resp.text();
                const rows = data.split("\n").map(r => r.split(","));
                const student = rows.find(r => r[0]?.trim() === admNo && r[5]?.trim().includes(selectedClass));
                if(student) showMarksheet(student);
                else alert("Not Found!");
            } catch (e) { alert("Network Error!"); }
        }

        function getGr(obt, mm) {
            if(!mm || mm <= 0) return "-";
            let p = (obt/mm)*100;
            if(p>=91) return "A1"; if(p>=81) return "A2"; if(p>=71) return "B1";
            if(p>=61) return "B2"; if(p>=51) return "C1"; if(p>=33) return "D"; return "E";
        }

        function showMarksheet(d) {
            const admNum = parseInt(d[0]);
            const isShifted = admNum >= 60; // Logic for shifted columns

            document.getElementById("sName").innerText = d[1];
            document.getElementById("sFather").innerText = d[2];
            document.getElementById("sAdm").innerText = d[0];
            document.getElementById("sReg").innerText = d[7];
            document.getElementById("sClass").innerText = d[5];
            
            // Attendance Fix
            document.getElementById("resAtten").innerText = isShifted ? d[11] : d[10];

            // Student Photo Fix
            let pLink = d[12]?.trim();
            if(pLink) {
                let id = pLink.includes("id=") ? pLink.split("id=")[1].split("&")[0] : (pLink.includes("/d/") ? pLink.split("/d/")[1].split("/")[0] : pLink);
                document.getElementById("photoArea").innerHTML = `<img src="https://drive.google.com/uc?export=view&id=${id}">`;
            }

            const subjects = [
                {n:"HINDI", f1:34, hy:92, f2:121, an:179},
                {n:"ENGLISH", f1:36, hy:94, f2:123, an:181},
                {n:"MATHS", f1:38, hy:96, f2:125, an:183},
                {n:"SCIENCE", f1:40, hy:98, f2:127, an:185},
                {n:"SST / EVS", f1:42, hy:100, f2:129, an:187},
                {n:"COMPUTER", f1:44, hy:102, f2:131, an:189},
                {n:"G.K.", f1:46, hy:104, f2:133, an:191},
                {n:"SANSKRIT", f1:48, hy:106, f2:135, an:193},
                {n:"ART", f1:50, hy:108, f2:137, an:195},
                {n:"PT/GAME", f1:52, hy:110, f2:139, an:197, type:"grade"}
            ];

            let html = "";
            let grandMM = 0, grandObt = 0;
            let totalF1m=0, totalF1o=0, totalHYm=0, totalHYo=0, totalF2m=0, totalF2o=0, totalANm=0, totalANo=0;

            subjects.forEach(s => {
                let offset = isShifted ? 1 : 0;
                
                // Fetch data using offset
                let m1 = parseFloat(d[s.f1 + offset]) || 0;
                let o1 = parseFloat(d[s.f1 + offset + 1]) || 0;
                let m2 = parseFloat(d[s.hy + offset]) || 0;
                let o2 = parseFloat(d[s.hy + offset + 1]) || 0;
                let m3 = parseFloat(d[s.f2 + offset]) || 0;
                let o3 = parseFloat(d[s.f2 + offset + 1]) || 0;
                let m4 = parseFloat(d[s.an + offset]) || 0;
                let o4 = parseFloat(d[s.an + offset + 1]) || 0;

                // For PT/GAME, grab the text grade directly from the OBT column
                let r1 = d[s.f1 + offset + 1], r2 = d[s.hy + offset + 1], r3 = d[s.f2 + offset + 1], r4 = d[s.an + offset + 1];

                let rowMM = m1 + m2 + m3 + m4;
                let rowObt = o1 + o2 + o3 + o4;

                if(s.type !== "grade") {
                    grandMM += rowMM; grandObt += rowObt;
                    totalF1m+=m1; totalF1o+=o1; totalHYm+=m2; totalHYo+=o2; 
                    totalF2m+=m3; totalF2o+=o3; totalANm+=m4; totalANo+=o4;
                    
                    html += `<tr><td class="sub-name">${s.n}</td>
                        <td>${m1}</td><td>${o1}</td><td>${getGr(o1,m1)}</td>
                        <td>${m2}</td><td>${o2}</td><td>${getGr(o2,m2)}</td>
                        <td>${m3}</td><td>${o3}</td><td>${getGr(o3,m3)}</td>
                        <td>${m4}</td><td>${o4}</td><td>${getGr(o4,m4)}</td>
                        <td class="total-row">${rowMM}</td><td class="total-row">${rowObt}</td><td class="total-row">${getGr(rowObt,rowMM)}</td></tr>`;
                } else {
                    html += `<tr><td class="sub-name">${s.n}</td>
                        <td>-</td><td>${r1}</td><td>${r1}</td>
                        <td>-</td><td>${r2}</td><td>${r2}</td>
                        <td>-</td><td>${r3}</td><td>${r3}</td>
                        <td>-</td><td>${r4}</td><td>${r4}</td>
                        <td class="total-row">-</td><td class="total-row">-</td><td class="total-row">-</td></tr>`;
                }
            });

            document.getElementById("marksBody").innerHTML = html;
            
            // Total Row Fix
            let totalFinalMM = totalF1m + totalHYm + totalF2m + totalANm;
            let totalFinalObt = totalF1o + totalHYo + totalF2o + totalANo;
            
            document.getElementById("totalRow").innerHTML = `<tr class="total-row"><td class="sub-name">TOTAL</td>
                <td>${totalF1m}</td><td>${totalF1o}</td><td>-</td>
                <td>${totalHYm}</td><td>${totalHYo}</td><td>-</td>
                <td>${totalF2m}</td><td>${totalF2o}</td><td>-</td>
                <td>${totalANm}</td><td>${totalANo}</td><td>-</td>
                <td>${totalFinalMM}</td><td>${totalFinalObt}</td><td>-</td></tr>`;

            let perc = totalFinalMM > 0 ? ((totalFinalObt/totalFinalMM)*100).toFixed(2) : 0;
            document.getElementById("resPerc").innerText = perc;
            document.getElementById("resGrade").innerText = getGr(totalFinalObt, totalFinalMM);
            document.getElementById("resStatus").innerText = perc >= 33 ? "PASSED" : "FAILED";
            document.getElementById("resStatus").style.color = perc >= 33 ? "green" : "red";
            document.getElementById("marksheetFull").style.display = "block";
        }
    </script>
</body>
</html>
