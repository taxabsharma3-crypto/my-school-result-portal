<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Rajni Public School - Result Portal</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; border-top: 5px solid #d32f2f; margin-bottom: 20px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #d32f2f; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 90%; font-weight: bold; }

        /* मार्कशीट स्टाइल */
        #marksheet { display: none; width: 1050px; background: #fff; padding: 40px; border: 3px double #2c3e50; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .st-photo { width: 120px; height: 140px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .st-photo img { width: 100%; height: 100%; object-fit: cover; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 12px; }
        th { background: #f2f2f2; font-weight: bold; }
        .sub-name { text-align: left; padding-left: 10px; font-weight: bold; }
        .grand-col { background: #fff9c4; font-weight: bold; }
        .total-row { background: #e3f2fd; font-weight: bold; }

        .result-footer { margin-top: 20px; border: 2px solid #2e7d32; padding: 15px; background: #f1f8e9; text-align: center; border-radius: 8px; }
        .remarks { margin-top: 15px; border-left: 5px solid #b71c1c; padding: 10px; background: #fff8e1; font-style: italic; text-align: left; }
        
        @media print { .search-card, .print-btn { display: none; } #marksheet { border: 2px solid #000; box-shadow: none; width: 100%; margin: 0; } }
    </style>
</head>
<body>

    <div class="search-card">
        <h2>RAJNI PUBLIC SCHOOL</h2>
        <input type="text" id="rollInput" placeholder="Enter Roll or Reg No.">
        <button onclick="loadStudentResult()">GENERATE MARKSHEET</button>
    </div>

    <div id="marksheet">
        <div class="header">
            <div style="width:100px;">LOGO</div>
            <div style="text-align:center;">
                <h1 style="margin:0; color:#b71c1c;">RAJNI PUBLIC SCHOOL</h1>
                <p>SESSION: 2025-26 | ANNUAL REPORT CARD</p>
            </div>
            <div class="st-photo" id="photoArea">PHOTO</div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 15px;">
            <div>
                <strong>Name:</strong> <span id="sName"></span><br>
                <strong>Father:</strong> <span id="sFather"></span>
            </div>
            <div style="text-align:right;">
                <strong>Roll No:</strong> <span id="sRoll"></span> | <strong>Class:</strong> <span id="sClass"></span><br>
                <strong>Reg No:</strong> <span id="sReg"></span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th rowspan="2" width="150">SUBJECTS</th>
                    <th colspan="3">FA-1</th><th colspan="3">HALF YEARLY</th>
                    <th colspan="3">FA-2</th><th colspan="3">ANNUAL</th>
                    <th colspan="3" class="grand-col">GRAND TOTAL</th>
                </tr>
                <tr>
                    <th>MM</th><th>OBT</th><th>GR</th><th>MM</th><th>OBT</th><th>GR</th>
                    <th>MM</th><th>OBT</th><th>GR</th><th>MM</th><th>OBT</th><th>GR</th>
                    <th class="grand-col">MM</th><th class="grand-col">OBT</th><th class="grand-col">GR</th>
                </tr>
            </thead>
            <tbody id="marksBody"></tbody>
            <tfoot id="totalRow"></tfoot>
        </table>

        <div class="result-footer">
            <h3 id="resStatus" style="margin:0; color:#1b5e20;"></h3>
            <p id="promoMsg" style="margin:5px 0; font-size:16px;"></p>
        </div>

        <div class="remarks">
            <strong>Remarks:</strong> <span id="sRemarks"></span>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 50px; font-weight: bold;">
            <p>Class Teacher</p>
            <p>Principal Signature</p>
        </div>
        <button class="print-btn" onclick="window.print()" style="margin-top:20px; padding:10px 20px; background:#2e7d32; color:white; border:none; border-radius:5px; cursor:pointer;">PRINT</button>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV1h6s0ZZ1ryGa112nhw3eeTXl_iR3hHmMg-JKJoyGb2s0cFO9b6YLH6i1uo4A4m9kfBHSTE9JRfiN/pub?gid=1253973170&single=true&output=csv";

        async function loadStudentResult() {
            const val = document.getElementById("rollInput").value.trim();
            if(!val) return alert("Enter Roll/Reg No");
            try {
                const resp = await fetch(CSV_URL + "?v=" + Date.now());
                const text = await resp.text();
                const rows = text.split("\n").map(r => r.split(","));
                const student = rows.find(r => r[8]?.trim() == val || r[7]?.trim() == val);
                if(student) renderMarks(student);
                else alert("Not Found!");
            } catch(e) { alert("Database Error!"); }
        }

        function getGr(obt, mm) {
            let p = (obt/mm)*100;
            if(p >= 91) return "A1"; if(p >= 81) return "A2"; if(p >= 71) return "B1";
            if(p >= 61) return "B2"; if(p >= 51) return "C1"; if(p >= 33) return "D"; return "E";
        }

        function renderMarks(d) {
            document.getElementById("sName").innerText = d[1];
            document.getElementById("sFather").innerText = d[2];
            document.getElementById("sClass").innerText = d[5];
            document.getElementById("sReg").innerText = d[7];
            document.getElementById("sRoll").innerText = d[8];
            document.getElementById("sRemarks").innerText = d[235] || "Excellent Progress.";

            const subjects = [
                {n:"HINDI", f1m:34, f1o:35, hym:92, hyo:93, f2m:121, f2o:122, anm:179, ano:180},
                {n:"ENGLISH", f1m:36, f1o:37, hym:94, hyo:95, f2m:123, f2o:124, anm:181, ano:182},
                {n:"MATHS", f1m:38, f1o:39, hym:96, hyo:97, f2m:125, f2o:126, anm:183, ano:184},
                {n:"SCIENCE", f1m:40, f1o:41, hym:98, hyo:99, f2m:127, f2o:128, anm:185, ano:186},
                {n:"SST", f1m:42, f1o:43, hym:100, hyo:101, f2m:129, f2o:130, anm:187, ano:188}
            ];

            let html = "";
            let tF1m=0, tF1o=0, tHYm=0, tHYo=0, tF2m=0, tF2o=0, tANm=0, tANo=0;

            subjects.forEach(s => {
                let o1=parseFloat(d[s.f1o])||0, m1=parseFloat(d[s.f1m])||0;
                let o2=parseFloat(d[s.hyo])||0, m2=parseFloat(d[s.hym])||0;
