<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Rajni Public School - Final Result</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #f0f2f5; padding: 20px; text-align: center; }
        .search-box { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; display: inline-block; border-top: 6px solid #d32f2f; }
        input { width: 80%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        button { background: #d32f2f; color: #fff; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 90%; font-weight: bold; }
        #marksheet { display: none; width: 1000px; background: #fff; padding: 40px; border: 4px double #000; margin: 30px auto; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: center; }
        .promo-box { margin-top: 20px; padding: 20px; background: #f1f8e9; border: 2px solid #2e7d32; text-align: center; border-radius: 10px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="search-box">
        <h2 style="color:#d32f2f;">RAJNI PUBLIC SCHOOL</h2>
        <input type="text" id="regInput" placeholder="Enter Registration No.">
        <button onclick="fetchData()">GENERATE RESULT</button>
        <p id="msg" style="color:blue; display:none;">Connecting...</p>
    </div>

    <div id="marksheet">
        <h1 style="text-align:center; color:#d32f2f; margin:0;">RAJNI PUBLIC SCHOOL</h1>
        <p style="text-align:center; font-weight:bold; border-bottom: 2px solid #000; padding-bottom: 10px;">PROGRESS REPORT | 2025-26</p>

        <div style="display: flex; justify-content: space-between; margin: 20px 0;">
            <div><strong>Name:</strong> <span id="sName"></span><br><strong>Father:</strong> <span id="sFather"></span></div>
            <div style="text-align: right;"><strong>Reg No:</strong> <span id="sReg"></span> | <strong>Class:</strong> <span id="sClass"></span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th rowspan="2">SUBJECTS</th>
                    <th colspan="2">FA-1</th><th colspan="2">HALF YEARLY</th><th colspan="2">FA-2</th><th colspan="2">ANNUAL</th><th colspan="2">GRAND TOTAL</th>
                </tr>
                <tr>
                    <th>MM</th><th>OBT</th><th>MM</th><th>OBT</th><th>MM</th><th>OBT</th><th>MM</th><th>OBT</th><th>MM</th><th>OBT</th>
                </tr>
            </thead>
            <tbody id="marksBody"></tbody>
        </table>

        <div id="promoMsg" class="promo-box"></div>
    </div>

    <script>
        const CSV_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV1h6s0ZZ1ryGa112nhw3eeTXl_iR3hHmMg-JKJoyGb2s0cFO9b6YLH6i1uo4A4m9kfBHSTE9JRfiN/pub?gid=1253973170&single=true&output=csv"; // Step 1 wala link yahan dalo

        async function fetchData() {
            const val = document.getElementById("regInput").value.trim();
            if(!val) return alert("Enter Reg No");
            document.getElementById("msg").style.display = "block";

            try {
                const proxy = "https://api.allorigins.win/raw?url=";
                const resp = await fetch(proxy + encodeURIComponent(CSV_LINK + "&t=" + Date.now()));
                const text = await resp.text();
                const rows = text.split(/\r?\n/).map(r => r.split(","));
                
                const student = rows.find(r => r[7] && r[7].trim() == val);

                if(student) {
                    render(student);
                    document.getElementById("marksheet").style.display = "block";
                    document.getElementById("msg").style.display = "none";
                } else {
                    alert("Not Found!");
                }
            } catch(e) { alert("Link Error!"); }
        }

        function render(d) {
            document.getElementById("sName").innerText = d[1];
            document.getElementById("sFather").innerText = d[2];
            document.getElementById("sClass").innerText = d[5];
            document.getElementById("sReg").innerText = d[7];

            const subs = [
                {n:"HINDI", f1m:34, f1o:35, hym:92, hyo:93, f2m:121, f2o:122, anm:179, ano:180},
                {n:"ENGLISH", f1m:36, f1o:37, hym:94, hyo:95, f2m:123, f2o:124, anm:181, ano:182},
                {n:"MATHS", f1m:38, f1o:39, hym:96, hyo:97, f2m:125, f2o:126, anm:183, ano:184},
                {n:"SCIENCE", f1m:40, f1o:41, hym:98, hyo:99, f2m:127, f2o:128, anm:185, ano:186},
                {n:"SST", f1m:42, f1o:43, hym:100, hyo:101, f2m:129, f2o:130, anm:187, ano:188},
                {n:"COMPUTER", f1m:44, f1o:45, hym:102, hyo:103, f2m:131, f2o:132, anm:189, ano:190},
                {n:"G.K.", f1m:46, f1o:47, hym:104, hyo:105, f2m:133, f2o:134, anm:191, ano:192},
                {n:"SANSKRIT", f1m:48, f1o:49, hym:106, hyo:107, f2m:135, f2o:136, anm:193, ano:194}
            ];

            let html = ""; let tO=0, tM=0;
            subs.forEach(s => {
                let m1=parseFloat(d[s.f1m])||0, o1=parseFloat(d[s.f1o])||0, m2=parseFloat(d[s.hym])||0, o2=parseFloat(d[s.hyo])||0;
                let m3=parseFloat(d[s.f2m])||0, o3=parseFloat(d[s.f2o])||0, m4=parseFloat(d[s.anm])||0, o4=parseFloat(d[s.ano])||0;
                let sm=m1+m2+m3+m4, so=o1+o2+o3+o4; tO+=so; tM+=sm;
                html += `<tr><td style="text-align:left; font-weight:bold;">${s.n}</td><td>${m1}</td><td>${o1}</td><td>${m2}</td><td>${o2}</td><td>${m3}</td><td>${o3}</td><td>${m4}</td><td>${o4}</td><td style="background:#eee;">${sm}</td><td style="background:#eee; font-weight:bold;">${so}</td></tr>`;
            });
            document.getElementById("marksBody").innerHTML = html;

            let p = (tO/tM)*100;
            let msg = p >= 91 ? "Awesome!" : p >= 81 ? "Unique!" : p >= 71 ? "Good going!" : p >= 33 ? "Passed!" : "Advice to Repeat Same Class";
            document.getElementById("promoMsg").innerHTML = `RESULT: ${p.toFixed(2)}% <br> ${msg} Your Child is promoted to next class.`;
        }
    </script>
</body>
</html>
