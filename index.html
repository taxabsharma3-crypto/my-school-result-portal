<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBCS Result Portal - Final 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 10px solid #1a73e8; }
        select, input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-search { background: #1a73e8; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 95%; font-weight: bold; font-size: 18px; margin-top: 10px; }
        
        #marksheetFull { display: none; width: 1000px; background: white; padding: 40px; border: 1px solid #000; margin-top: 30px; }
        .header-main { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px double #1a73e8; padding-bottom: 20px; }
        
        /* Logo Styling - Super Fixed */
        .logo-box { width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
        .logo-box img { max-width: 130px; max-height: 130px; object-fit: contain; display: block; }

        .st-photo { width: 130px; height: 150px; border: 2px solid #1a73e8; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .st-photo img { width: 100%; height: 100%; object-fit: cover; }

        .marks-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; text-align: center; }
        .marks-table th, .marks-table td { border: 1px solid #1a73e8; padding: 8px; }
        .bg-head { background: #e8f0fe; color: #1a73e8; font-weight: bold; }
        .sub-name { text-align: left !important; font-weight: bold; padding-left: 15px !important; }
        .total-row { background: #d2e3fc; font-weight: bold; color: #1557b0; }

        .final-summary { margin-top: 20px; display: flex; justify-content: space-around; border: 2px solid #1a73e8; padding: 20px; background: #f8fbff; font-weight: bold; font-size: 18px; }
        .sig-container { display: flex; justify-content: space-between; margin-top: 70px; }
        .sig-box { text-align: center; width: 220px; border-top: 2px solid #333; padding-top: 10px; font-weight: bold; }

        @media print { .search-card, .btn-search, select, input { display: none; } #marksheetFull { display: block !important; border: none; width: 100%; } }
    </style>
</head>
<body>

    <div class="search-card">
        <h1 style="color:#1a73e8;">BBCS RESULT</h1>
        <select id="studentClassSelect">
            <option value="">-- Select Class --</option>
            <option value="8">Class 8</option><option value="7">Class 7</option><option value="6">Class 6</option><option value="5">Class 5</option>
        </select>
        <input type="text" id="admInput" placeholder="Admission No.">
        <button class="btn-search" id="searchBtn" onclick="findResult()">VIEW RESULT</button>
    </div>

    <div id="marksheetFull">
        <div class="header-main">
            <div class="logo-box">
                <img id="schoolLogo" src="https://lh3.googleusercontent.com/d/1UPFTUfGRttSd6jdF4VK8KqTRI30sy0ad" alt="School Logo" onerror="this.src='https://drive.google.com/uc?export=view&id=1UPFTUfGRttSd6jdF4VK8KqTRI30sy0ad'">
            </div>
            <div style="text-align:center;">
                <h1 style="margin:0; font-size: 34px; color: #1a73e8;">BLUE BELLS CONVENT SCHOOL</h1>
                <p style="margin:5px 0; font-weight: bold; font-size: 18px;">ANNUAL PROGRESS REPORT CARD (2025-26)</p>
            </div>
            <div class="st-photo" id="photoArea">PHOTO</div>
        </div>

        <div style="display: flex; justify-content: space-between; margin: 20px 0; padding: 15px; background: #f8fbff; border: 1px solid #d2e3fc;">
            <div><strong>Student:</strong> <span id="sName" style="text-transform: uppercase;"></span><br><strong>Father:</strong> <span id="sFather" style="text-transform: uppercase;"></span></div>
            <div style="text-align:right;"><strong>Adm No:</strong> <span id="sAdm"></span> | <strong>Class:</strong> <span id="sClass"></span></div>
        </div>

        <table class="marks-table">
            <thead>
                <tr class="bg-head">
                    <th rowspan="2" style="width: 180px;">SUBJECT</th>
                    <th colspan="3">FA-1</th><th colspan="3">HALF YEARLY</th><th colspan="3">FA-2</th><th colspan="3">ANNUAL</th><th colspan="3">TOTAL</th>
                </tr>
                <tr class="bg-head"><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th><th>MM</th><th>Obt</th><th>GR</th></tr>
            </thead>
            <tbody id="marksBody"></tbody>
            <tfoot id="totalRow"></tfoot>
        </table>

        <div class="final-summary">
            <div>PERCENTAGE: <span id="resPerc"></span>%</div>
            <div>GRADE: <span id="resGrade"></span></div>
            <div>STATUS: <span id="resStatus"></span></div>
        </div>

        <div class="sig-container">
            <div class="sig-box">Parent's Signature</div>
            <div class="sig-box">Class Teacher</div>
            <div class="sig-box">Principal Signature</div>
        </div>

        <div style="text-align: center; margin-top: 40px;"><button onclick="window.print()" style="background:#28a745; color:white; padding:15px 40px; border:none; border-radius:8px; cursor:pointer; font-weight: bold;">Download Result</button></div>
    </div>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVYOZX3AnpGZi8LxABZEEFC0Iya7ZtSJdxAvNwXI2zFgwtmWUtgAjZW81QQCxFeb6Npj1WvXepkOYy/pub?gid=853110802&single=true&output=csv";

        function toDirect(url) {
            if(!url) return "";
            let id = url.includes("id=") ? url.split("id=")[1].split("&")[0] : (url.includes("/d/") ? url.split("/d/")[1].split("/")[0] : url);
            return `https://lh3.googleusercontent.com/d/${id}`;
        }

        async function findResult() {
            const sClass = document.getElementById("studentClassSelect").value;
            const admNo = document.getElementById("admInput").value.trim();
            const btn = document.getElementById("searchBtn");

            if(!sClass || !admNo) return alert("Details bharo!");
            btn.innerText = "Finding Record...";

            try {
                const response = await fetch(SHEET_CSV + "?v=" + Date.now());
                const text = await response.text();
                const rows = text.split(/\r?\n/).map(r => r.split(","));
                const d = rows.find(r => r[0] && r[0].trim() === admNo && r[5]?.includes(sClass));

                if (d) {
                    renderData(d);
                } else {
                    alert("Record Not Found! Check Adm No and Class.");
                }
            } catch (e) { alert("Internet Slow! Refresh karein."); }
            finally { btn.innerText = "VIEW RESULT"; }
        }

        function getGr(o, m) {
            if (!m || m <= 0) return "-";
            let p = (o/m)*100;
            if(p>=91) return "A1"; if(p>=81) return "A2"; if(p>=71) return "B1";
            if(p>=61) return "B2"; if(p>=51) return "C1"; if(p>=33) return "D"; return "E";
        }

        function renderData(d) {
            document.getElementById("sName").innerText = d[1];
            document.getElementById("sFather").innerText = d[2];
            document.getElementById("sAdm").innerText = d[0];
            document.getElementById("sClass").innerText = d[5];

            const adm = parseInt(d[0]);
            const off = (adm >= 60) ? 1 : 0;
            
            // Photo Fix
            if(d[12]) document.getElementById("photoArea").innerHTML = `<img src="${toDirect(d[12])}">`;

            const subs = [
                {n:"HINDI", f1:34, hy:92, f2:121, an:179},
                {n:"ENGLISH", f1:36, hy:94, f2:123, an:181},
                {n:"MATHS", f1:38, hy:96, f2:125, an:183},
                {n:"SCIENCE", f1:40, hy:98, f2:127, an:185},
                {n:"SST/EVS", f1:42, hy:100, f2:129, an:187},
                {n:"COMPUTER", f1:44, hy:102, f2:131, an:189},
                {n:"G.K.", f1:46, hy:104, f2:133, an:191},
                {n:"SANSKRIT", f1:48, hy:106, f2:135, an:193},
                {n:"ART", f1:50, hy:108, f2:137, an:195},
                {n:"PT/GAME", f1:52, hy:110, f2:139, an:197, isG:true}
            ];

            let html = "";
            let tm1=0, to1=0, tm2=0, to2=0, tm3=0, to3=0, tm4=0, to4=0;

            subs.forEach(s => {
                let m1 = parseFloat(d[s.f1+off])||0, o1 = parseFloat(d[s.f1+off+1])||0;
                let m2 = parseFloat(d[s.hy+off])||0, o2 = parseFloat(d[s.hy+off+1])||0;
                let m3 = parseFloat(d[s.f2+off])||0, o3 = parseFloat(d[s.f2+off+1])||0;
                let m4 = parseFloat(d[s.an+off])||0, o4 = parseFloat(d[s.an+off+1])||0;

                if(o1 > m1 && m1 > 0) { let t=m1; m1=o1; o1=t; }
                if(o2 > m2 && m2 > 0) { let t=m2; m2=o2; o2=t; }
                if(o3 > m3 && m3 > 0) { let t=m3; m3=o3; o3=t; }
                if(o4 > m4 && m4 > 0) { let t=m4; m4=o4; o4=t; }

                if(!s.isG) {
                    tm1+=m1; to1+=o1; tm2+=m2; to2+=o2; tm3+=m3; to3+=o3; tm4+=m4; to4+=o4;
                    let rM=m1+m2+m3+m4, rO=o1+o2+o3+o4;
                    html += `<tr><td class="sub-name">${s.n}</td><td>${m1}</td><td>${o1}</td><td>${getGr(o1,m1)}</td><td>${m2}</td><td>${o2}</td><td>${getGr(o2,m2)}</td><td>${m3}</td><td>${o3}</td><td>${getGr(o3,m3)}</td><td>${m4}</td><td>${o4}</td><td>${getGr(o4,m4)}</td><td class="total-row">${rM}</td><td class="total-row">${rO}</td><td class="total-row">${getGr(rO,rM)}</td></tr>`;
                } else {
                    let g1=d[s.f1+off+1]||"-", g2=d[s.hy+off+1]||"-", g3=d[s.f2+off+1]||"-", g4=d[s.an+off+1]||"-";
                    html += `<tr><td class="sub-name">${s.n}</td><td>-</td><td>${g1}</td><td>${g1}</td><td>-</td><td>${g2}</td><td>${g2}</td><td>-</td><td>${g3}</td><td>${g3}</td><td>-</td><td>${g4}</td><td>${g4}</td><td class="total-row">-</td><td class="total-row">-</td><td class="total-row">-</td></tr>`;
                }
            });

            document.getElementById("marksBody").innerHTML = html;
            let fMM=tm1+tm2+tm3+tm4, fOB=to1+to2+to3+to4;
            document.getElementById("totalRow").innerHTML = `<tr class="total-row"><td class="sub-name">TOTAL</td><td>${tm1}</td><td>${to1}</td><td>-</td><td>${tm2}</td><td>${to2}</td><td>-</td><td>${tm3}</td><td>${to3}</td><td>-</td><td>${tm4}</td><td>${to4}</td><td>-</td><td>${fMM}</td><td>${fOB}</td><td>-</td></tr>`;

            let p = fMM>0 ? ((fOB/fMM)*100).toFixed(2) : 0;
            document.getElementById("resPerc").innerText = p;
            document.getElementById("resGrade").innerText = getGr(fOB, fMM);
            document.getElementById("resStatus").innerText = p>=33 ? "PASSED" : "FAILED";
            document.getElementById("marksheetFull").style.display = "block";
        }
    </script>
</body>
</html>
